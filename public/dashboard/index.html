<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rythu Seva Kendra · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #16241E;
    --bg-panel: #1F332B;
    --bg-panel-2: #253D33;
    --paper: #F3EDDD;
    --accent-mustard: #D6A039;
    --accent-mustard-dim: #B98A2E;
    --accent-sage: #8FAF7B;
    --accent-rust: #B65C3D;
    --text-light: #F3EDDD;
    --text-dim: #A9BDB0;
    --text-dark: #1F2A20;
    --line: rgba(243,237,221,0.14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: radial-gradient(ellipse at top, #1C2F26 0%, #101C16 70%);
    font-family: 'Inter', sans-serif;
    color: var(--text-light);
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  .wrap { max-width: 920px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }

  .wordmark {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0;
  }
  .wordmark .sub {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-mustard);
    margin-top: 6px;
  }

  .config {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .config label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .config input {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text-light);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    width: 220px;
  }

  .stats {
    display: flex;
    gap: 14px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    min-width: 130px;
  }
  .stat .num {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
  }
  .stat.escalated .num { color: var(--accent-rust); }
  .stat.pending .num { color: var(--accent-mustard); }
  .stat.resolved .num { color: var(--accent-sage); }
  .stat .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .filter-btn {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text-dim);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
  }
  .filter-btn.active {
    background: var(--accent-mustard);
    color: #1B1405;
    border-color: var(--accent-mustard);
  }

  .case-grid {
    display: grid;
    gap: 14px;
  }

  .case-card {
    background: var(--paper);
    color: var(--text-dark);
    border-radius: 16px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: start;
  }

  .case-main .farmer {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 17px;
  }
  .case-main .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #5C6B5D;
    margin-top: 2px;
  }
  .case-main .diagnosis {
    margin-top: 10px;
    font-size: 14.5px;
    line-height: 1.5;
  }
  .case-main .disease-name {
    font-weight: 600;
    margin-right: 6px;
  }

  .severity-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .sev-low { background: rgba(143,175,123,0.3); color: #4B6B3B; }
  .sev-medium { background: rgba(214,160,57,0.3); color: #8A5F17; }
  .sev-high { background: rgba(182,92,61,0.3); color: #8A3D24; }

  .case-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .status-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .status-escalated { background: rgba(182,92,61,0.15); color: var(--accent-rust); border: 1px solid rgba(182,92,61,0.3); }
  .status-resolved { background: rgba(143,175,123,0.15); color: #4B6B3B; border: 1px solid rgba(143,175,123,0.3); }
  .status-auto_resolved { background: rgba(169,189,176,0.2); color: #5C6B5D; border: 1px solid rgba(92,107,93,0.2); }

  .resolve-btn {
    padding: 8px 14px;
    border-radius: 10px;
    border: none;
    background: var(--text-dark);
    color: var(--paper);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .resolve-btn:hover { opacity: 0.85; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="wordmark">Rythu Seva Kendra
      <span class="sub">Kisan Alert · Expert Follow-up Dashboard</span>
    </p>
    <div class="config">
      <label>Backend</label>
      <input type="text" id="backendUrl" value="http://localhost:8080" />
    </div>
  </header>

  <div class="stats">
    <div class="stat escalated"><div class="num" id="statEscalated">0</div><div class="label">Needs Review</div></div>
    <div class="stat resolved"><div class="num" id="statResolved">0</div><div class="label">Resolved</div></div>
    <div class="stat pending"><div class="num" id="statTotal">0</div><div class="label">Total Cases</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="escalated">Needs Review</button>
    <button class="filter-btn" data-filter="resolved">Resolved</button>
    <button class="filter-btn" data-filter="all">All Cases</button>
  </div>

  <div class="case-grid" id="caseGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">No cases here yet — waiting for farmers to submit photo diagnoses.</div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let currentFilter = "escalated";
let allCases = [];

function backendUrl() {
  return $("backendUrl").value.replace(/\/$/, "");
}

async function fetchCases() {
  try {
    const res = await fetch(`${backendUrl()}/api/cases`);
    allCases = await res.json();
    render();
  } catch (err) {
    console.error("Failed to fetch cases:", err);
  }
}

function render() {
  const escalatedCount = allCases.filter(c => c.status === "escalated").length;
  const resolvedCount = allCases.filter(c => c.status === "resolved").length;
  $("statEscalated").textContent = escalatedCount;
  $("statResolved").textContent = resolvedCount;
  $("statTotal").textContent = allCases.length;

  let filtered = allCases;
  if (currentFilter === "escalated") filtered = allCases.filter(c => c.status === "escalated");
  if (currentFilter === "resolved") filtered = allCases.filter(c => c.status === "resolved");

  const grid = $("caseGrid");
  grid.innerHTML = "";

  if (filtered.length === 0) {
    $("emptyState").style.display = "block";
    return;
  }
  $("emptyState").style.display = "none";

  filtered.forEach((c) => {
    const sevClass = c.diagnosis.severity === "high" ? "sev-high" : c.diagnosis.severity === "medium" ? "sev-medium" : "sev-low";
    const statusClass = `status-${c.status}`;
    const time = new Date(c.timestamp).toLocaleString();

    const card = document.createElement("div");
    card.className = "case-card";
    card.innerHTML = `
      <div class="case-main">
        <span class="severity-badge ${sevClass}">${c.diagnosis.severity} · ${c.diagnosis.confidence}% confidence</span>
        <div class="farmer">${c.farmerName}</div>
        <div class="meta">${c.district.toUpperCase()} &middot; ${time} &middot; ID: ${c.farmerId}</div>
        <div class="diagnosis">
          <span class="disease-name">${c.diagnosis.disease_name}</span>
          — ${c.diagnosis.recommendation_en || c.diagnosis.recommendation_hi || ""}
        </div>
      </div>
      <div class="case-actions">
        <span class="status-pill ${statusClass}">${c.status.replace("_"," ")}</span>
        ${c.status === "escalated" ? `<button class="resolve-btn" data-id="${c.id}">Mark Resolved</button>` : ""}
      </div>
    `;
    grid.appendChild(card);
  });

  document.querySelectorAll(".resolve-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "Resolving...";
      try {
        await fetch(`${backendUrl()}/api/cases/${btn.dataset.id}/resolve`, { method: "POST" });
        await fetchCases();
      } catch (err) {
        alert("Failed to resolve: " + err.message);
      }
    });
  });
}

document.querySelectorAll(".filter-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

fetchCases();
setInterval(fetchCases, 8000); // auto-refresh every 8s so new cases appear live during demo
</script>
</body>
</html>
